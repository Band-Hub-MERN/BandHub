name: Deploy MERN Application

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v5

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Install and build frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # Deploy frontend to server
      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "frontend/dist/*"
          target: "/var/www/html"
          strip_components: 2
          rm: true

      # Deploy backend files to server
      - name: Deploy backend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "server.js,api.js,authToken.js,models/**,utils/**,package.json,package-lock.json"
          target: "/var/cardsServer"
          overwrite: true

      # Install backend dependencies and restart PM2
      - name: Install dependencies and restart server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Navigate to backend directory
            cd /var/cardsServer

            # Install dependencies
            npm ci --omit=dev

            # Ensure PM2 is installed globally
            npm list -g pm2 || npm install -g pm2

            # Reload the application with PM2 (zero-downtime reload)
            pm2 reload express-server --update-env || pm2 start server.js --name "express-server"

            # Save PM2 process list
            pm2 save

            # Configure Nginx: serve frontend and proxy API to backend
            cat > /etc/nginx/sites-available/default << 'EOF'
            server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/html;
              index index.html;

              location /api/ {
                proxy_pass http://127.0.0.1:5001;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location / {
                try_files $uri /index.html;
              }
            }
            EOF

            # Reload nginx
            nginx -t && systemctl reload nginx